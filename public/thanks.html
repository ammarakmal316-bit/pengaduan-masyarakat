<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terima Kasih - Layanan Pengaduan Masyarakat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      background: #f0ebf8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #e6f4ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      fill: #137333;
    }
    h1 {
      color: #333;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #4a148c;
      color: white;
      text-decoration: none;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #6a1cb3;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h1>Terima Kasih!</h1>
    <p>Laporan atau saran Anda telah berhasil dikirim.<br>Kami akan menindaklanjuti secepatnya.</p>
    <a href="/" class="btn">Kirim Laporan Baru</a>
  </div>
</body>
</html>
